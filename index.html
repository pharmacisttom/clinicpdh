<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clinic Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Login View -->
  <div id="loginView" class="login-container" style="display: none;">
    <div class="login-card">
      <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">เข้าสู่ระบบ</h2>
      <div class="form-group">
        <label class="form-label" for="loginUsername">ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="กรอก Username">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">รหัสผ่าน (Password)</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="กรอกรหัสผ่าน">
      </div>
      <button type="button" id="btnLogin" class="btn-primary" style="width: 100%;">เข้าสู่ระบบ</button>
      <div id="loginError" style="color: var(--danger-color); text-align: center; margin-top: 1rem; display: none; font-size: 0.9rem;"></div>
    </div>
  </div>

  <!-- Main App -->
  <div class="app-container" id="appContainer" style="display: none;">
    <!-- Header -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding-right: 1.5rem;">
      <div class="header-title">📋 ระบบเก็บข้อมูลลงพื้นที่</div>
      <div style="font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; color: white;">
        <span id="userProfileName"></span>
        <button id="btnLogout" class="btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem; background: rgba(255,255,255,0.2); border: none; color: white;">ออก</button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <div id="tabNav" class="tab-nav">
      <!-- Tabs will be injected here dynamically -->
    </div>

  <main class="container">
    
    <!-- List View -->
    <section id="listView" class="list-view">
      <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
        <div class="search-container" style="flex: 1; margin-right: 1rem; margin-bottom: 0;">
          <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาข้อมูล...">
        </div>
        <button class="btn-add" id="btnShowAddForm">+ เพิ่มข้อมูล</button>
      </div>

      <div id="loadingState" class="loading-state" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 3rem 0;">
        <div class="spinner-large"></div>
        <p>กำลังโหลดข้อมูล...</p>
      </div>

      <div id="clinicList" class="clinic-list">
        <!-- Clinic cards will be injected here via JS -->
      </div>
    </section>

    <!-- Form View -->
    <section id="formView" class="form-view" style="display: none;">
      <button class="btn-back" id="btnBack">← กลับไปหน้ารายการ</button>
      
      <div class="card">
        <h2 id="formTitle" style="margin-bottom:1.5rem; color:var(--primary-color);">เพิ่มข้อมูลใหม่</h2>
        
        <form id="clinicForm">
          <input type="hidden" id="formRowIndex" value="">
          
          <!-- Dynamic Form Fields Container -->
          <div id="dynamicFormFields"></div>
          
          <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-color);">
          
          <!-- GPS Feature -->
          <div class="form-group">
            <label class="form-label" for="coordinates">พิกัด GPS (ละติจูด, ลองจิจูด)</label>
            <div style="display: flex; gap: 0.5rem;">
              <input type="text" id="coordinates" class="form-input" placeholder="คลิกปุ่มเพื่อดึงพิกัดอัตโนมัติ" readonly style="flex: 1; background-color: var(--bg-color);">
              <button type="button" id="btnGPS" class="btn-secondary" style="white-space: nowrap;">
                📍 ดึงพิกัด
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="photo">รูปภาพแนบ (ถ่ายรูป / เลือกไฟล์หลายรูปได้)</label>
            <input type="file" id="photo" class="form-input" accept="image/*" multiple capture="environment">
            <div style="margin-top: 0.5rem; text-align: right;">
              <button type="button" id="btnClearPhotos" class="btn-secondary" style="display:none; margin-left: auto; padding: 0.25rem 0.5rem; font-size: 0.75rem; border-color: var(--danger-color); color: var(--danger-color);">ล้างรูปภาพใหม่ที่เลือก</button>
            </div>
            <div id="photoPreviewContainer" style="display:none; margin-top:0.5rem; flex-wrap: wrap; gap: 0.5rem;">
              <!-- Images will be injected here -->
            </div>
          </div>
          
          <button type="submit" id="btnSubmit" class="btn-primary" style="width:100%; margin-top:1rem;">
            <span id="submitText">💾 บันทึกข้อมูล</span>
            <div id="submitLoader" class="loader" style="display: none; margin: 0 auto;"></div>
          </button>
        </form>
      </div>
    </section>
  </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
