<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clinic Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>ระบบจัดการคลินิก</h1>
    <button class="btn-add" id="btnShowAddForm">+ เพิ่มคลินิก</button>
  </nav>

  <!-- Login View -->
  <div id="loginView" class="login-container" style="display: none;">
    <div class="login-card">
      <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">เข้าสู่ระบบ</h2>
      <div class="form-group">
        <label class="form-label" for="loginUsername">ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="กรอก Username">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">รหัสผ่าน (Password)</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="กรอกรหัสผ่าน">
      </div>
      <button type="button" id="btnLogin" class="btn-primary" style="width: 100%;">เข้าสู่ระบบ</button>
      <div id="loginError" style="color: var(--danger-color); text-align: center; margin-top: 1rem; display: none; font-size: 0.9rem;"></div>
    </div>
  </div>

  <!-- Main App -->
  <div class="app-container" id="appContainer" style="display: none;">
    <!-- Header -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding-right: 1.5rem;">
      <div class="header-title">📋 ระบบตรวจคลินิก</div>
      <div style="font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; color: white;">
        <span id="userProfileName"></span>
        <button id="btnLogout" class="btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem; background: rgba(255,255,255,0.2); border: none; color: white;">ออก</button>
      </div>
    </header>

  <main class="container">
    
    <!-- List View -->
    <div id="listView">
      <div class="search-container">
        <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาคลินิก, รหัส หรือชื่อผู้รับอนุญาต...">
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner-large"></div>
        <p>กำลังโหลดข้อมูล...</p>
      </div>

      <div id="clinicList" class="clinic-list">
        <!-- Clinic cards will be injected here via JS -->
      </div>
    </div>

    <!-- Form View -->
    <div id="formView" class="form-view">
      <div class="form-header">
        <button id="btnBack" class="btn-back">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </button>
        <h2 id="formTitle">เพิ่มข้อมูลคลินิกใหม่</h2>
      </div>

      <form id="clinicForm">
        <input type="hidden" id="formRowIndex" value="">
        
        <div class="form-group">
          <label class="form-label" for="clinicName">ชื่อคลินิก *</label>
          <input type="text" id="clinicName" class="form-input" required placeholder="เช่น บุญประทานคลินิกเวชกรรม">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="clinicCode">รหัสคลินิก *</label>
            <input type="text" id="clinicCode" class="form-input" required placeholder="11 หลัก">
          </div>
          <div class="form-group">
            <label class="form-label" for="oldClinicCode">รหัสคลินิกเดิม</label>
            <input type="text" id="oldClinicCode" class="form-input" placeholder="ถ้ามี">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="licensee">ผู้รับอนุญาต</label>
          <input type="text" id="licensee" class="form-input">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="operator">ผู้ดำเนินการ</label>
            <input type="text" id="operator" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" for="licenseNum">เลขที่ใบประกอบฯ</label>
            <input type="text" id="licenseNum" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="licenseeCode">รหัสผู้รับอนุญาต</label>
          <input type="text" id="licenseeCode" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label" for="address">ที่อยู่</label>
          <textarea id="address" class="form-input" rows="2"></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="subdistrict">ตำบล</label>
            <input type="text" id="subdistrict" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" for="district">อำเภอ</label>
            <input type="text" id="district" class="form-input" value="ปลวกแดง">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="operatingHours">เวลาเปิดทำการ</label>
          <input type="text" id="operatingHours" class="form-input" placeholder="เช่น ทุกวัน 08.00-20.00 น.">
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">เบอร์โทรศัพท์</label>
          <input type="tel" id="phone" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label" for="wasteDisposal">แหล่งกำจัดขยะติดเชื้อ</label>
          <input type="text" id="wasteDisposal" class="form-input">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="expiryDate">ปีที่หมดอายุ</label>
            <input type="text" id="expiryDate" class="form-input" placeholder="เช่น 2568">
          </div>
          <div class="form-group">
            <label class="form-label" for="currentExpiry">วันที่หมดอายุปัจจุบัน</label>
            <input type="text" id="currentExpiry" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="coordinates">พิกัดคลินิก (Lat, Long)</label>
          <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="coordinates" class="form-input" placeholder="เช่น 13.015, 101.151" style="flex: 1;">
            <button type="button" id="btnGPS" class="btn-secondary">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              ดึงพิกัด
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="photo">รูปภาพแนบ (ถ่ายรูป / เลือกไฟล์หลายรูปได้)</label>
          <input type="file" id="photo" class="form-input" accept="image/*" multiple capture="environment">
          <div style="margin-top: 0.5rem; text-align: right;">
            <button type="button" id="btnClearPhotos" class="btn-secondary" style="display:none; margin-left: auto; padding: 0.25rem 0.5rem; font-size: 0.75rem; border-color: var(--danger-color); color: var(--danger-color);">ล้างรูปภาพใหม่ที่เลือก</button>
          </div>
          <div id="photoPreviewContainer" style="display:none; margin-top:0.5rem; flex-wrap: wrap; gap: 0.5rem;">
            <!-- Images will be injected here -->
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">ข้อเพิ่มเติม / เครื่องมือแพทย์</label>
          <textarea id="notes" class="form-input" rows="3"></textarea>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">
          <span id="submitText">บันทึกข้อมูล</span>
          <div id="submitLoader" class="loader"></div>
        </button>
      </form>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
