<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Postmarket</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- SweetAlert2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

  <!-- Login View -->
  <div id="loginView" class="container" style="display: none; min-height: 100vh; align-items: center; justify-content: center;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 1rem; overflow: hidden;">
      <div class="bg-primary text-white text-center py-4">
        <h3 class="mb-1 fw-bold">ยินดีต้อนรับ</h3>
        <p class="mb-0 opacity-75 small">เข้าสู่ระบบ Postmarket</p>
      </div>
      <div class="card-body p-4 p-md-5">
        <div class="mb-3">
          <label class="form-label text-secondary small fw-bold" for="loginUsername">ชื่อผู้ใช้งาน (Username)</label>
          <input type="text" id="loginUsername" class="form-control form-control-lg bg-light" placeholder="Username">
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold" for="loginPassword">รหัสผ่าน (Password)</label>
          <input type="password" id="loginPassword" class="form-control form-control-lg bg-light" placeholder="Password">
        </div>
        <button type="button" id="btnLogin" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
          เข้าสู่ระบบ
        </button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContainer" style="display: none;">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
      <div class="container-fluid px-3 px-md-4">
        <span class="navbar-brand text-primary fw-bold">📋 ระบบ Postmarket</span>
        <div class="d-flex align-items-center gap-2">
          <span id="userProfileName" class="text-secondary small fw-medium"></span>
          <button id="btnLogout" class="btn btn-outline-danger btn-sm">ออก</button>
        </div>
      </div>
    </nav>

    <!-- Tab Navigation -->
    <div class="bg-white border-bottom shadow-sm">
      <div class="container-fluid px-0">
        <ul class="nav nav-tabs border-0 flex-nowrap overflow-auto px-3 px-md-4 pt-2" id="tabNav" style="scrollbar-width: none;">
          <!-- Tabs dynamically injected -->
        </ul>
      </div>
    </div>

    <!-- Main Content Container -->
    <main class="container-fluid px-3 px-md-4 py-4">
      
      <!-- List View -->
      <section id="listView">
        <div class="row mb-4 align-items-center g-3">
          <div class="col-12 col-md-8">
            <div class="input-group">
              <span class="input-group-text bg-white"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></span>
              <input type="text" id="searchInput" class="form-control" placeholder="ค้นหาข้อมูล...">
            </div>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button class="btn btn-primary w-100 w-md-auto fw-medium shadow-sm" id="btnShowAddForm">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 
              เพิ่มข้อมูล
            </button>
          </div>
        </div>

        <div id="loadingState" class="text-center py-5" style="display:none;">
          <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3 text-secondary">กำลังโหลดข้อมูล...</p>
        </div>

        <div id="clinicList" class="row g-3">
          <!-- Cards injected via JS -->
        </div>
      </section>

      <!-- Form View -->
      <section id="formView" style="display: none;">
        <div class="mb-3">
          <button class="btn btn-link text-decoration-none p-0 text-secondary" id="btnBack">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            กลับหน้ารายการ
          </button>
        </div>
        
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h4 id="formTitle" class="text-primary mb-4 fw-bold">เพิ่มข้อมูลใหม่</h4>
            
            <form id="clinicForm">
              <input type="hidden" id="formRowIndex" value="">
              
              <!-- Dynamic Form Fields -->
              <div id="dynamicFormFields" class="row g-3"></div>
              
              <hr class="my-4 text-muted">
              
              <!-- GPS Feature -->
              <div class="row g-3 align-items-end mb-3">
                <div class="col-12 col-md-8">
                  <label class="form-label fw-bold" for="coordinates">พิกัด GPS (ละติจูด, ลองจิจูด)</label>
                  <input type="text" id="coordinates" class="form-control" placeholder="เช่น 13.7563, 100.5018 หรือคลิกปุ่มด้านล่าง">
                  <div class="form-text mb-2">สามารถพิมพ์ละติจูดและลองจิจูดเองได้ หรือกดปุ่มดึงพิกัดอัตโนมัติ</div>
                </div>
                <div class="col-12 col-md-4">
                  <button type="button" id="btnGPS" class="btn btn-outline-primary w-100">
                    📍 ดึงพิกัด
                  </button>
                </div>
              </div>

              <!-- Photo Feature -->
              <div class="mb-4">
                <label class="form-label" for="photo">รูปภาพแนบ (ถ่ายรูป / เลือกไฟล์หลายรูปได้)</label>
                <input type="file" id="photo" class="form-control" accept="image/*" multiple capture="environment">
                <div class="text-end mt-2">
                  <button type="button" id="btnClearPhotos" class="btn btn-sm btn-outline-danger" style="display:none;">ล้างรูปภาพใหม่ที่เลือก</button>
                </div>
                <div id="photoPreviewContainer" class="d-flex flex-wrap gap-2 mt-2" style="display:none !important;">
                  <!-- Images injected here -->
                </div>
              </div>
              
              <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                <span id="submitText">💾 บันทึกข้อมูล</span>
                <div id="submitLoader" class="spinner-border spinner-border-sm" role="status" style="display: none;">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <!-- Custom JS -->
  <script src="app.js?v=3"></script>
</body>
</html>
