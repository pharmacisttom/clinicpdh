<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Postmarket</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- SweetAlert2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

  <!-- Login View -->
  <div id="loginView" class="container" style="display: none; min-height: 100vh; align-items: center; justify-content: center;">
    <div class="card border-0" style="width: 100%; max-width: 420px;">
      <div class="login-header-gradient text-white">
        <div class="login-avatar">
          <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
        </div>
        <h3 class="mb-1 fw-bold">ยินดีต้อนรับ</h3>
        <p class="mb-0 opacity-75 small">เข้าสู่ระบบ Postmarket</p>
      </div>
      <div class="card-body p-4 p-md-5">
        <div class="form-floating mb-3">
          <input type="text" id="loginUsername" class="form-control" placeholder="Username">
          <label for="loginUsername" class="text-muted"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -3px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>ชื่อผู้ใช้งาน</label>
        </div>
        <div class="form-floating mb-4">
          <input type="password" id="loginPassword" class="form-control" placeholder="Password">
          <label for="loginPassword" class="text-muted"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -3px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>รหัสผ่าน</label>
        </div>
        <button type="button" id="btnLogin" class="btn btn-primary btn-lg w-100 fw-bold">
          เข้าสู่ระบบ
        </button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContainer" style="display: none;">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-fluid px-3 px-md-4 py-1">
        <span class="navbar-brand text-primary fw-bold d-flex align-items-center gap-2">
          <div class="bg-primary text-white rounded d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          </div>
          ระบบ Postmarket
        </span>
        <div class="d-flex align-items-center gap-3">
          <span id="userProfileName" class="text-dark small fw-semibold"></span>
          <button id="btnLogout" class="btn btn-outline-danger btn-sm rounded-pill px-3">ออก</button>
        </div>
      </div>
    </nav>

    <!-- Tab Navigation -->
    <div class="border-bottom pb-2 pt-3">
      <div class="container-fluid px-3 px-md-4">
        <ul class="nav nav-tabs-custom flex-nowrap overflow-auto" id="tabNav" style="scrollbar-width: none;">
          <!-- Tabs dynamically injected -->
        </ul>
      </div>
    </div>

    <!-- Main Content Container -->
    <main class="container-fluid px-3 px-md-4 py-4">
      
      <!-- List View -->
      <section id="listView">
        <div class="row mb-4 align-items-center g-3">
          <div class="col-12 col-md-8">
            <div class="input-group search-wrapper">
              <span class="input-group-text"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></span>
              <input type="text" id="searchInput" class="form-control" placeholder="ค้นหาข้อมูล...">
            </div>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button class="btn btn-primary w-100 w-md-auto shadow-sm" id="btnShowAddForm">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 
              เพิ่มข้อมูล
            </button>
          </div>
        </div>

        <div id="loadingState" class="text-center py-5" style="display:none;">
          <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3 text-secondary">กำลังโหลดข้อมูล...</p>
        </div>

        <div id="clinicList" class="row g-3">
          <!-- Cards injected via JS -->
        </div>
      </section>

      <!-- Form View -->
      <section id="formView" style="display: none;">
        <div class="mb-3">
          <button class="btn btn-link text-decoration-none p-0 text-secondary" id="btnBack">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            กลับหน้ารายการ
          </button>
        </div>
        
        <div class="glass-card mb-5">
          <div class="card-body p-4 p-md-5">
            <h4 id="formTitle" class="text-primary mb-4 fw-bold">เพิ่มข้อมูลใหม่</h4>
            
            <form id="clinicForm">
              <input type="hidden" id="formRowIndex" value="">
              
              <!-- Dynamic Form Fields -->
              <div id="dynamicFormFields" class="row g-4"></div>
              
              <hr class="my-4 text-muted opacity-25">
              
              <!-- GPS Feature -->
              <h6 class="fw-bold mb-3 text-dark">ข้อมูลที่ตั้งและรูปภาพ</h6>
              <div class="row g-3 align-items-center mb-4">
                <div class="col-12 col-md-8">
                  <div class="form-floating">
                    <input type="text" id="coordinates" class="form-control" placeholder="เช่น 13.7563, 100.5018">
                    <label for="coordinates" class="text-muted"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-1" style="vertical-align: -3px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>พิกัด GPS (ละติจูด, ลองจิจูด)</label>
                  </div>
                  <div class="form-text ms-1 mt-1">พิมพ์ค่าพิกัดเอง หรือกดปุ่มด้านขวาเพื่อดึงตำแหน่งจากมือถืออัตโนมัติ</div>
                </div>
                <div class="col-12 col-md-4">
                  <button type="button" id="btnGPS" class="btn btn-outline-primary w-100 h-100 d-flex align-items-center justify-content-center" style="min-height: calc(3.5rem + 2px);">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-2"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> ดึงพิกัดปัจจุบัน
                  </button>
                </div>
              </div>

              <!-- Photo Feature -->
              <div class="mb-4">
                <label class="form-label" for="photo">รูปภาพแนบ (ถ่ายรูป / เลือกไฟล์หลายรูปได้)</label>
                <input type="file" id="photo" class="form-control" accept="image/*" multiple capture="environment">
                <div class="text-end mt-2">
                  <button type="button" id="btnClearPhotos" class="btn btn-sm btn-outline-danger" style="display:none;">ล้างรูปภาพใหม่ที่เลือก</button>
                </div>
                <div id="photoPreviewContainer" class="d-flex flex-wrap gap-2 mt-2" style="display:none !important;">
                  <!-- Images injected here -->
                </div>
              </div>
              
              <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                <span id="submitText">💾 บันทึกข้อมูล</span>
                <div id="submitLoader" class="spinner-border spinner-border-sm" role="status" style="display: none;">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <!-- Custom JS -->
  <script src="app.js?v=3"></script>
</body>
</html>
